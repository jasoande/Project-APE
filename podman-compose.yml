version: '3.8'

services:
  project-ape:
    build:
      context: .
      dockerfile: Containerfile
    container_name: project-ape
    image: project-ape:latest

    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - DASHBOARD_PORT=8765
      - LOG_LEVEL=INFO

    # Port mapping
    ports:
      - "8765:8765"  # Dashboard

    # Volume mounts
    volumes:
      # Client data (read-only recommended)
      - ./Venella_2026:/app/Venella_2026:ro
      # Configuration
      - ./vars.py:/app/vars.py:ro
      # Prompt files
      - ./ask_prompt_01.txt:/app/ask_prompt_01.txt:ro
      - ./ask_prompt_02.txt:/app/ask_prompt_02.txt:ro
      - ./chat_prompt_01.txt:/app/chat_prompt_01.txt:ro
      - ./chat_prompt_02.txt:/app/chat_prompt_02.txt:ro
      - ./chat_prompt_03.txt:/app/chat_prompt_03.txt:ro
      - ./chat_prompt_04.txt:/app/chat_prompt_04.txt:ro
      - ./chat_prompt_05.txt:/app/chat_prompt_05.txt:ro
      - ./chat_prompt_06.txt:/app/chat_prompt_06.txt:ro
      - ./chat_prompt_07.txt:/app/chat_prompt_07.txt:ro
      - ./chat_prompt_08.txt:/app/chat_prompt_08.txt:ro
      - ./chat_prompt_09.txt:/app/chat_prompt_09.txt:ro
      - ./chat_prompt_10.txt:/app/chat_prompt_10.txt:ro
      - ./chat_prompt_11.txt:/app/chat_prompt_11.txt:ro
      - ./chat_prompt_12.txt:/app/chat_prompt_12.txt:ro
      # Logs (persistent)
      - ./logs:/app/logs
      # Status files
      - ./.multi_process_status:/app/.multi_process_status
      # NotebookLM credentials (if using file-based auth)
      - ${HOME}/.notebooklm:/home/apeuser/.notebooklm:ro

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G

    # Restart policy
    restart: unless-stopped

    # Network mode
    network_mode: bridge

    # Command override (optional)
    # command: ["python3", "main.py", "--mode", "deep", "--clients", "merck_test"]

# Volumes (optional - for named volumes)
# volumes:
#   ape-logs:
#   ape-status:
