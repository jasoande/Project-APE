<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project APE - Configuration Tool</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Red Hat Text", "Roboto", Arial, sans-serif;
            background: #0f1419;
            color: #e6edf3;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0a0d14 0%, #1a1f2e 50%, #0f1419 100%);
            border-bottom: 3px solid #ee0000;
            padding: 30px 60px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 8px;
        }
        .header p {
            color: #8b949e;
            font-size: 0.95rem;
        }
        .header-nav {
            margin-top: 15px;
        }
        .header-nav a {
            color: #e6edf3;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .header-nav a:hover {
            background: rgba(255,255,255,0.1);
            border-color: #ee0000;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #ee0000;
            color: #fff;
        }
        .btn-primary:hover {
            background: #cc0000;
            box-shadow: 0 4px 12px rgba(238,0,0,0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #e6edf3;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }
        .btn-danger {
            background: rgba(220,38,38,0.2);
            color: #fca5a5;
            border: 1px solid #dc2626;
        }
        .btn-danger:hover {
            background: rgba(220,38,38,0.3);
        }

        /* Client Cards */
        .clients-grid {
            display: grid;
            gap: 20px;
            margin: 30px 0;
        }
        .client-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 24px;
            position: relative;
        }
        .client-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .client-card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }
        .client-card-remove {
            background: transparent;
            border: none;
            color: #dc2626;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .client-card-remove:hover {
            background: rgba(220,38,38,0.2);
        }

        /* Form Fields */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #c0c8d0;
            margin-bottom: 8px;
        }
        .form-label .required {
            color: #ee0000;
            margin-left: 4px;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #e6edf3;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #ee0000;
            box-shadow: 0 0 0 3px rgba(238,0,0,0.1);
        }
        .form-input.error {
            border-color: #dc2626;
            background: rgba(220,38,38,0.05);
        }
        .form-error {
            color: #fca5a5;
            font-size: 0.85rem;
            margin-top: 6px;
            display: none;
        }
        .form-error.visible {
            display: block;
        }
        .form-help {
            color: #8b949e;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        /* Action Bar */
        .action-bar {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 24px;
            margin: 30px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        /* Messages */
        .message {
            padding: 16px 20px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
        .message.visible {
            display: block;
        }
        .message-success {
            background: rgba(34,197,94,0.1);
            border: 1px solid #22c55e;
            color: #86efac;
        }
        .message-error {
            background: rgba(220,38,38,0.1);
            border: 1px solid #dc2626;
            color: #fca5a5;
        }
        .message-info {
            background: rgba(59,130,246,0.1);
            border: 1px solid #3b82f6;
            color: #93c5fd;
        }

        /* Loading Spinner */
        .loading {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 20px;
        }
        .loading.visible {
            display: flex;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(238,0,0,0.2);
            border-top-color: #ee0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚙️ Project APE Configuration</h1>
        <p>Configure clients and generate vars.py configuration file</p>
        <div class="header-nav">
            <a href="/">← Back to Dashboard</a>
        </div>
    </div>

    <div class="container">
        <!-- Messages -->
        <div id="successMessage" class="message message-success"></div>
        <div id="errorMessage" class="message message-error"></div>
        <div id="infoMessage" class="message message-info"></div>

        <!-- Loading Indicator -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <span>Generating configuration...</span>
        </div>

        <!-- Global Settings Section -->
        <div style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 24px; margin-bottom: 30px;">
            <h2 style="font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 20px;">⚙️ Global Settings</h2>

            <div class="form-group">
                <label class="form-label">
                    Persona (AI Response Perspective)
                </label>
                <input
                    type="text"
                    class="form-input"
                    id="persona"
                    value="Red Hat solutions architect"
                    placeholder="e.g., Red Hat solutions architect, account executive, customer success manager"
                />
                <div class="form-help">The role perspective for AI-generated responses in chat prompts</div>
            </div>

            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label">
                    Default Execution Mode
                </label>
                <select class="form-input" id="defaultMode">
                    <option value="fast" selected>Fast Mode (10-15 min target)</option>
                    <option value="deep">Deep Mode (35-40 min target)</option>
                </select>
                <div class="form-help">Default mode when --mode is not specified</div>
            </div>
        </div>

        <!-- Clients Section -->
        <div id="clientsSection">
            <h2 style="font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 20px;">👥 Client Configurations</h2>

            <div class="clients-grid" id="clientsGrid">
                <!-- Client cards will be added here dynamically -->
            </div>

            <div class="action-bar">
                <button type="button" class="btn btn-secondary" id="addClientBtn">
                    ➕ Add Client
                </button>
                <button type="button" class="btn btn-primary" id="generateBtn">
                    📥 Generate Configuration
                </button>
            </div>
        </div>
    </div>

    <script>
        // Client data array
        let clients = [];

        // Add first client by default
        window.addEventListener('DOMContentLoaded', () => {
            addClient();
        });

        function sanitizeClientId(name) {
            // Convert name to valid Python identifier
            let id = name.toLowerCase();
            id = id.replace(/[\s-]+/g, '_');
            id = id.replace(/[^a-z0-9_]/g, '');
            if (id && /^\d/.test(id)) {
                id = '_' + id;
            }
            return id.substring(0, 64);
        }

        function addClient() {
            const clientId = `client_${Date.now()}`;
            const client = {
                id: clientId,
                name: '',
                folder: '',
                industry: '',
                subsegments: ''
            };
            clients.push(client);
            renderClients();
        }

        function removeClient(clientId) {
            clients = clients.filter(c => c.id !== clientId);
            renderClients();
        }

        function updateClient(clientId, field, value) {
            const client = clients.find(c => c.id === clientId);
            if (client) {
                client[field] = value;

                // Auto-generate client ID from name
                if (field === 'name' && value) {
                    const sanitized = sanitizeClientId(value);
                    if (sanitized) {
                        client.id_generated = sanitized;
                    }
                }
            }
        }

        function validateDriveUrl(url) {
            const folderPattern = /\/folders\/([a-zA-Z0-9_-]+)/;
            return folderPattern.test(url) || url.startsWith('drive://') || (!url.includes('drive.google.com') && url.trim() !== '');
        }

        function validateClient(client) {
            const errors = [];

            if (!client.name.trim()) {
                errors.push('Name is required');
            }
            if (!client.folder.trim()) {
                errors.push('Folder URL/path is required');
            } else if (client.folder.includes('drive.google.com') && !validateDriveUrl(client.folder)) {
                errors.push('Invalid Drive URL format. Expected: https://drive.google.com/drive/folders/FOLDER_ID');
            }

            return errors;
        }

        function renderClients() {
            const grid = document.getElementById('clientsGrid');
            grid.innerHTML = '';

            clients.forEach((client, index) => {
                const card = document.createElement('div');
                card.className = 'client-card';
                card.innerHTML = `
                    <div class="client-card-header">
                        <h3 class="client-card-title">Client ${index + 1}${client.name ? ': ' + client.name : ''}</h3>
                        <button type="button" class="client-card-remove" onclick="removeClient('${client.id}')" title="Remove Client">×</button>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            Client Name<span class="required">*</span>
                        </label>
                        <input
                            type="text"
                            class="form-input"
                            id="${client.id}_name"
                            value="${client.name}"
                            placeholder="e.g., Acme Corp, Sample Industries"
                            oninput="updateClient('${client.id}', 'name', this.value)"
                        />
                        <div class="form-error" id="${client.id}_name_error"></div>
                        ${client.id_generated ? `<div class="form-help">Client ID: ${client.id_generated}</div>` : ''}
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            Google Drive Folder URL or Local Path<span class="required">*</span>
                        </label>
                        <input
                            type="text"
                            class="form-input"
                            id="${client.id}_folder"
                            value="${client.folder}"
                            placeholder="https://drive.google.com/drive/folders/ABC123 or /path/to/folder"
                            oninput="updateClient('${client.id}', 'folder', this.value)"
                            onblur="validateField('${client.id}', 'folder')"
                        />
                        <div class="form-error" id="${client.id}_folder_error"></div>
                        <div class="form-help">Paste the full Google Drive folder URL from your browser, or provide a local folder path</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            Industry
                        </label>
                        <input
                            type="text"
                            class="form-input"
                            id="${client.id}_industry"
                            value="${client.industry}"
                            placeholder="e.g., pharmaceuticals and life sciences"
                            oninput="updateClient('${client.id}', 'industry', this.value)"
                        />
                        <div class="form-help">Can be left empty for AI auto-detection</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            Subsegments
                        </label>
                        <input
                            type="text"
                            class="form-input"
                            id="${client.id}_subsegments"
                            value="${client.subsegments}"
                            placeholder="e.g., drug discovery, clinical trials, manufacturing operations"
                            oninput="updateClient('${client.id}', 'subsegments', this.value)"
                        />
                        <div class="form-help">Comma-separated research areas (can be left empty for AI auto-detection)</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function validateField(clientId, field) {
            const client = clients.find(c => c.id === clientId);
            if (!client) return;

            const input = document.getElementById(`${clientId}_${field}`);
            const errorEl = document.getElementById(`${clientId}_${field}_error`);

            if (field === 'folder' && client.folder.includes('drive.google.com')) {
                if (!validateDriveUrl(client.folder)) {
                    input.classList.add('error');
                    errorEl.textContent = 'Invalid Drive URL format';
                    errorEl.classList.add('visible');
                    return false;
                } else {
                    input.classList.remove('error');
                    errorEl.classList.remove('visible');
                }
            }

            return true;
        }

        function showMessage(type, message) {
            // Hide all messages
            document.getElementById('successMessage').classList.remove('visible');
            document.getElementById('errorMessage').classList.remove('visible');
            document.getElementById('infoMessage').classList.remove('visible');

            // Show the appropriate message
            const messageEl = document.getElementById(`${type}Message`);
            messageEl.textContent = message;
            messageEl.classList.add('visible');

            // Auto-hide after 5 seconds for non-error messages
            if (type !== 'error') {
                setTimeout(() => {
                    messageEl.classList.remove('visible');
                }, 5000);
            }
        }

        function downloadFile(content, filename) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function generateConfiguration() {
            // Validate all clients
            let hasErrors = false;
            const allErrors = [];

            clients.forEach((client, index) => {
                const errors = validateClient(client);
                if (errors.length > 0) {
                    hasErrors = true;
                    allErrors.push(`Client ${index + 1}: ${errors.join(', ')}`);
                }
            });

            if (hasErrors) {
                showMessage('error', 'Validation errors:\n' + allErrors.join('\n'));
                return;
            }

            if (clients.length === 0) {
                showMessage('error', 'Please add at least one client');
                return;
            }

            // Check for duplicate client IDs
            const clientIds = clients.map(c => c.id_generated || sanitizeClientId(c.name));
            const duplicates = clientIds.filter((id, index) => clientIds.indexOf(id) !== index);
            if (duplicates.length > 0) {
                showMessage('error', `Duplicate client IDs detected: ${duplicates.join(', ')}. Please use different names.`);
                return;
            }

            // Show loading
            document.getElementById('loading').classList.add('visible');
            document.getElementById('clientsSection').style.opacity = '0.5';

            try {
                // Prepare client data with generated IDs
                const clientsData = clients.map(c => ({
                    id: c.id_generated || sanitizeClientId(c.name),
                    name: c.name.trim(),
                    folder: c.folder.trim(),
                    industry: c.industry.trim(),
                    subsegments: c.subsegments.trim()
                }));

                // Get global settings
                const persona = document.getElementById('persona').value.trim() || 'Red Hat solutions architect';
                const defaultMode = document.getElementById('defaultMode').value || 'fast';

                // Prepare request payload with settings
                const payload = {
                    clients: clientsData,
                    settings: {
                        persona: persona,
                        default_mode: defaultMode
                    }
                };

                const response = await fetch('/api/generate-config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    // Download the generated file
                    downloadFile(data.content, data.filename);
                    showMessage('success', `✅ Configuration generated successfully! File downloaded as ${data.filename}. Replace your existing vars.py with this file.`);
                } else {
                    showMessage('error', 'Generation failed:\n' + (data.errors ? data.errors.join('\n') : data.error || 'Unknown error'));
                }
            } catch (error) {
                showMessage('error', `Failed to generate configuration: ${error.message}`);
            } finally {
                document.getElementById('loading').classList.remove('visible');
                document.getElementById('clientsSection').style.opacity = '1';
            }
        }

        // Event listeners
        document.getElementById('addClientBtn').addEventListener('click', addClient);
        document.getElementById('generateBtn').addEventListener('click', generateConfiguration);
    </script>
</body>
</html>
